spring:
  datasource:
    url: jdbc:mysql://localhost:3306/typing_game?serverTimezone=Asia/Tokyo&useUnicode=true&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": true
    open-in-view: false
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations:
      - classpath:db/migration
      - classpath:db/vendor/{vendor}

server:
  address: localhost
  port: 8091

app:
  cors:
    allowed-origins:
      - http://localhost:8081
      - http://localhost:5173
  jwt:
    secret: ${JWT_SECRET:local-development-jwt-secret-key-please-change-32bytes}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:3600}
    issuer: typing-game-backend
